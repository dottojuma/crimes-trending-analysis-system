<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTAS - Kiolesura cha Mwananchi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-xl">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-indigo-900">CTAS - Ripoti Tukio la Uhalifu</h1>
            <p class="text-gray-600 text-sm mt-1">Jaza fomu hii kwa uangalifu ili kutuma taarifa kwa siri kwenda Jeshi la Polisi.</p>
        </div>

        <form id="crimeReportForm" class="space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Maelezo ya Tukio (Nini kimetokea?)</label>
                <textarea id="description" rows="4" required 
                    class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Andika maelezo kamili ya tukio hapa..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Namba ya Wilaya (ID ya Wilaya kule DB)</label>
                <input type="number" id="districtId" required
                    class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Mfano: 1">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Namba ya Aina ya Uhalifu (ID ya Uhalifu)</label>
                <input type="number" id="crimeTypeId" required
                    class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    placeholder="Mfano: 2">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">GPS Latitude</label>
                    <input type="number" step="any" id="latitude" required
                        class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                        placeholder="Mfano: -6.7924">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">GPS Longitude</label>
                    <input type="number" step="any" id="longitude" required
                        class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                        placeholder="Mfano: 39.2714">
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-indigo-900 text-white p-3 rounded-md font-bold hover:bg-indigo-800 transition duration-200 cursor-pointer">
                Tuma Ripoti Polisi
            </button>
        </form>
    </div>

    <script>
        // Kukamata Fomu kutoka kwenye HTML ili tuweze kuisikiliza (Event Listener)
        const form = document.getElementById('crimeReportForm');
        const submitBtn = document.getElementById('submitBtn');

        // KUSIKILIZA ANWANI: Mtumiaji akibonyeza kitufe cha kutuma
        form.addEventListener('submit', async (event) => {
            // 1. ZUIA FOMU ISIREFRESH UKURASA (Prevent Default Behavior)
            event.preventDefault();

            // 2. BADILISHA KITUFE KUWA LOADING STATE
            submitBtn.innerText = "Inatuma...";
            submitBtn.disabled = true;

            // 3. ANWANI YA BACKEND API (DJANGO ENDPOINT)
            const apiUrl = "http://127.0.0.1:8000/api/reports/";

            // 4. KUKUSANYA DATA KUTOKA KWENYE FOMU NA KUZIGEUSA KUWA JAVASCRIPT OBJECT
            const reportData = {
                description: document.getElementById('description').value,
                district: parseInt(document.getElementById('districtId').value),     // Geuza kuwa Integer
                crime_type: parseInt(document.getElementById('crimeTypeId').value), // Geuza kuwa Integer
                gps_latitude: parseFloat(document.getElementById('latitude').value), // Geuza kuwa Decimal/Float
                gps_longitude: parseFloat(document.getElementById('longitude').value),
                status: "NEW" // Ripoti zote zinaanza zikiwa mpya
            };

            try {
                // 5. SAFIRISHA DATA (HTTP FETCH POST REQUEST)
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json' // Tofahamisha Django kuwa tunatuma JSON
                    },
                    body: JSON.stringify(reportData) // Geuza Object ya JS kuwa umbo la JSON string halisi
                });

                // 6. CHAMBUA MAJIBU YA BACKEND SEVA
                if (response.ok) {
                    // Kama status code ipo kati ya 200-299 (Success)
                    alert("Hongera! Ripoti yako imepokelewa na Jeshi la Polisi kwa mafanikio.");
                    form.reset(); // Safisha fomu baada ya kufanikiwa
                } else {
                    // Seva imekataa (Kuna makosa ya muundo au validiations)
                    alert("Kosa limejitokeza: Seva imekataa kupokea data. Angalia kama ID zipo sahihi.");
                }
            } catch (error) {
                // Hapa inakamata makosa kama server ipo OFF au hakuna mtandao kabisa
                alert("Tatizo la Mtandao: Imeshindwa kuunganishwa na Seva ya Django. Hakikisha 'runserver' ipo hai.");
                console.error("Network Error: ", error);
            } finally {
                // 7. RUDISHA KITUFE HALI YA KAWAIDA
                submitBtn.innerText = "Tuma Ripoti Polisi";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
