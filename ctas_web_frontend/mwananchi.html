<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lango la Mwananchi - CTAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <nav class="border-b border-slate-800/80 bg-slate-900/60 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🛡️</span>
            <span class="text-xl font-extrabold tracking-wider bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">CTAS CITIZEN</span>
        </div>
        <div class="flex items-center space-x-3">
            <a href="track_report.html" class="text-xs bg-slate-800/80 border border-slate-700/50 text-slate-300 hover:bg-slate-700 hover:text-white px-4 py-2.5 rounded-xl transition shadow-md">
                🔍 Fuatilia Ripoti
            </a>
        </div>
    </nav>

    <main class="max-w-3xl w-full mx-auto p-4 md:p-8 my-4 flex-grow flex flex-col justify-center">
        
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-black text-slate-100">
                Ulinzi Shirikishi <span class="text-emerald-400">CTAS</span>
            </h1>
        </div>

        <div class="bg-slate-900/50 border border-slate-800/80 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-lg">
            <div class="border-b border-slate-800/60 pb-3 mb-5">
                <h2 class="text-base font-bold text-emerald-400 flex items-center gap-2">
                    <span>📝</span> Ripoti Tukio la Uhalifu
                </h2>
            </div>

            <form id="crimeReportForm" onsubmit="submitReport(event)" class="space-y-4">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Aina ya Tukio / Uhalifu</label>
                        <select id="crime_type" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 rounded-xl px-4 py-3 text-xs text-slate-200 focus:outline-none transition cursor-pointer">
                            <option value="" disabled selected>Chagua aina ya tukio...</option>
                            <option value="1">Wizi au Uporaji</option>
                            <option value="2">Ushambulizi wa Mwili</option>
                            <option value="3">Uharibifu wa Mali / Miundo mbinu</option>
                            <option value="4">Ulaghai / Uhalifu wa Mtandaoni</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Wilaya / District</label>
                        <select id="district" class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 rounded-xl px-4 py-3 text-xs text-slate-200 focus:outline-none transition cursor-pointer">
                            <option value="" disabled selected>Chagua Wilaya ilipo...</option>
                            <option value="1">Ilala</option>
                            <option value="2">Kinondoni</option>
                            <option value="3">Temeke</option>
                            <option value="4">Ubungo</option>
                            <option value="5">Kigamboni</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Maelezo ya Description (Nini kimetokea)</label>
                    <textarea id="description" rows="3" placeholder="Eleza kwa ufupi tukio lilivyotokea..." 
                              class="w-full bg-slate-950 border border-slate-800 focus:border-emerald-500 rounded-xl px-4 py-3 text-xs text-slate-200 focus:outline-none transition resize-none"></textarea>
                </div>

                <div class="bg-slate-950/80 border border-slate-800 rounded-xl p-4 space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-cyan-400 flex items-center gap-1.5">
                            <span class="animate-pulse text-red-500">📡</span> Satellite Live Location Track
                        </span>
                        <button type="button" onclick="getLocation()" class="text-[11px] bg-cyan-500/10 hover:bg-cyan-500/20 text-cyan-400 border border-cyan-500/20 px-3 py-1.5 rounded-lg transition font-semibold">
                            Chukua Mahali Nilipo (Get GPS)
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-500 mb-1">Latitude</label>
                            <input type="text" id="latitude" readonly placeholder="Inasubiri GPS..." 
                                   class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-500 mb-1">Longitude</label>
                            <input type="text" id="longitude" readonly placeholder="Inasubiri GPS..." 
                                   class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 focus:outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Ambatisha Ushahidi (Picha / Video)</label>
                    <div class="border border-dashed border-slate-800 hover:border-slate-700 bg-slate-950/40 rounded-xl p-3 text-center transition relative group cursor-pointer">
                        <input type="file" id="evidenceFile" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                        <div class="flex items-center justify-center space-x-2">
                            <span class="text-lg">📸</span>
                            <span class="text-xs text-slate-400">Bofya hapa kupakia Picha au Video ya Ushahidi</span>
                        </div>
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-slate-950 font-extrabold py-3 rounded-xl text-xs tracking-wider transition uppercase transform active:scale-[0.99]">
                        Tuma Ripoti kwa Jeshi la Polisi 🚀
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-4 text-center">
            <p class="text-xs text-slate-500">
                Tayari una ripoti? <a href="track_report.html" class="text-emerald-400 hover:underline font-semibold">Fuatilia Hapa 🔍</a>
            </p>
        </div>
    </main>

    <footer class="text-center py-4 text-[10px] text-slate-600 border-t border-slate-900/60 bg-slate-950">
        © 2026 CTAS Automation. Haki zote zimehifadhiwa Jeshi la Polisi.
    </footer>

    <script>
        function getLocation() {
            const latInput = document.getElementById('latitude');
            const longInput = document.getElementById('longitude');
            
            if (navigator.geolocation) {
                latInput.placeholder = "Inatafuta Satilaiti...";
                longInput.placeholder = "Inatafuta Satilaiti...";
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        latInput.value = position.coords.latitude.toFixed(6);
                        longInput.value = position.coords.longitude.toFixed(6);
                    },
                    (error) => {
                        alert("Imeshindwa kupata eneo lako. Hakikisha umeruhusu Location (GPS) kwenye browser yako.");
                        latInput.placeholder = "Goma kupata GPS";
                        longInput.placeholder = "Goma kupata GPS";
                    }
                );
            } else {
                alert("Browser yako haisapoti mifumo ya Geolocation.");
            }
        }

        async function submitReport(event) {
            event.preventDefault();
            
            const crime_type = document.getElementById('crime_type').value;
            const district = document.getElementById('district').value;
            const description = document.getElementById('description').value;
            
            // Kama GPS haikubonyezwa, tunaweka thamani mbadala (default) ili kuzuia kosa la 400 bad request
            const lat = document.getElementById('latitude').value || "0.0";
            const long = document.getElementById('longitude').value || "0.0";
            
            if(!crime_type || !district || !description) {
                alert("Tafadhali jaza Aina ya Tukio, Wilaya na Maelezo kamili!");
                return;
            }
            
            const formData = new FormData();
            // MAJINA HAYA YAMESAWRAZISHWA NA MODEL HALISI YA DJANGO (models.py)
            formData.append('district', district); 
            formData.append('crime_type', crime_type);
            formData.append('description', description);
            formData.append('gps_latitude', parseFloat(lat));
            formData.append('gps_longitude', parseFloat(long));
            
            const fileInput = document.getElementById('evidenceFile');
            if (fileInput.files.length > 0) {
                formData.append('evidence_url', fileInput.files[0]);
            }

            try {
                // Mlango rasmi wa asili wa REST API ya Django
                const response = await fetch('http://127.0.0.1:8000/api/reports/', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const reportData = await response.json();
                    // Tunachukua ID halisi ya namba iliyotemwa na Database ya Django (mfano: 12)
                    const databaseId = reportData.id;

                    alert(`🚨 RIPOTI IMESAJILIWA KWENYE DATABASE!\n\nNamba yako ya kufuatilia ni: ${databaseId}\n\nTafadhali itunze namba hii vizuri.`);
                    
                    // Mwananchi anasafirishwa kwenda kufuatilia kwa kutumia hiyo ID halisi ya namba
                    window.location.href = `track_report.html?ref=${databaseId}`;
                } else {
                    const errorData = await response.json();
                    alert("Seva imekataa data! Sababu ya kiufundi: " + JSON.stringify(errorData));
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Seva haipatikani kwa sasa. Hakikisha 'python manage.py runserver' imewaka.");
            }
        }
    </script>
</body>
</html>
